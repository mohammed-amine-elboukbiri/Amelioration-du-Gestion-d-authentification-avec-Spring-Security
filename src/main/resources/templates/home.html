<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            width: 420px;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 15px;
            color: #1e3c72;
        }

        p {
            margin-bottom: 20px;
            color: #444;
        }

        ul {
            list-style: none;
            margin: 20px 0;
        }

        li {
            margin: 12px 0;
        }

        a {
            text-decoration: none;
            display: inline-block;
            background: #2a5298;
            color: white;
            padding: 12px 18px;
            border-radius: 8px;
        }

        a:hover {
            background: #1e3c72;
        }

        .logout-btn {
            margin-top: 20px;
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #d9534f;
            color: white;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #c9302c;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>Bienvenue dans l’application sécurisée</h2>
    <p>Connexion réussie ! Choisissez votre espace :</p>

    <ul>
        <li><a th:href="@{/user/dashboard}">Espace Utilisateur</a></li>
        <li><a th:href="@{/admin/dashboard}">Espace Administrateur</a></li>
    </ul>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="logout-btn">Se déconnecter</button>
    </form>
</div>
</body>
</html>
