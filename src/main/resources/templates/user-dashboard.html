<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Espace Utilisateur</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 35px;
            width: 400px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
        }

        h2 {
            color: #11998e;
            margin-bottom: 10px;
        }

        p {
            color: #555;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .btn-home {
            background: #11998e;
        }

        .btn-home:hover {
            background: #0f857c;
        }

        .btn-logout {
            background: #e74c3c;
            border: none;
            cursor: pointer;
        }

        .btn-logout:hover {
            background: #c0392b;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="card">
    <h2>👤 Espace Utilisateur</h2>
    <p>Accessible aux rôles USER et ADMIN</p>

    <a th:href="@{/home}" class="btn btn-home">Retour</a>

    <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-logout">Déconnexion</button>
    </form>
</div>

</body>
</html>
